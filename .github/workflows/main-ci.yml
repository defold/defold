        if: failure() && env.SLACK_NOTIFICATIONS_ENABLED == 'true',
        with: {type: '${{ job.status }}', job_name: '${{ job.status }}: platform: ${{ matrix.platform }}', channel: '#defold-alarms-build', url: '${{ secrets.SLACK_WEBHOOK }}',
