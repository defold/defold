  # ---- RELEASE ------------------

  release:
    needs: [build-editor-macos, build-editor-windows, build-editor-linux, test-bob]
    runs-on: ubuntu-22.04
    steps: [
      {
        name: 'Checkout CI scripts',
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd, # v6.0.2
        with: {
          ref: '${{env.BUILD_BRANCH}}',
          path: ci-check,
          sparse-checkout: 'ci'
        }
      },
      {
        name: 'Check release branch',
        id: release,
        run: 'echo "should_release=$(python3 ci-check/ci/ci.py should-release)" >> "$GITHUB_OUTPUT"'
      },
      {
        name: 'Checkout',
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd, # v6.0.2
        if: &should_release steps.release.outputs.should_release == 'true',
        with: {
          ref: '${{env.BUILD_BRANCH}}',
          fetch-tags: true
        }
      },
      { name: 'Cache Defold downloads', if: *should_release, uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae, with: { path: '~/.dcache', key: "${{ runner.os }}-${{ matrix.platform || 'default' }}-dcache-${{ hashFiles('build_tools/sdk.py') }}", restore-keys: "${{ runner.os }}-${{ matrix.platform || 'default' }}-dcache-\n${{ runner.os }}-dcache-" } }, # v5.0.5
      { name: 'Install Python', if: *should_release, uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405, with: { python-version: 3.13} }, # v6.2.0
      { name: 'Setup git user', if: *should_release, run: 'git config --global user.email "services@defold.se" && git config --global user.name "Defold Services"' },
      { name: 'Install dependencies', if: *should_release, run: 'ci/ci.sh install --platform=${{ matrix.platform }}' },
      {
        # only needed for some python dependencies (should have a separate python setup function?)
        name: 'Install ext dependencies',
        if: *should_release,
        shell: bash,
        run: 'ci/ci.sh install_ext'
      },
      {
        name: 'Release',
        if: *should_release,
        run: 'ci/ci.sh release'
      },
      {
        name: 'Publish updated API ref',
        uses: defold/repository-dispatch@2d664dcc9f8090e4328d0c7f98aa483f832c80b3, # 1.2.1
        if: steps.release.outputs.should_release == 'true' && ((github.ref == 'refs/heads/master') || (github.ref == 'refs/heads/beta') || (github.ref == 'refs/heads/dev')),
        with: {
          repo: 'defold/defold.github.io',
          token: '${{ secrets.SERVICES_GITHUB_TOKEN }}',
          user: 'services@defold.se',
          action: 'refdoc'
        }
      },
      {
        name: 'Notify if build status changed',
        uses: homoluctus/slatify@c4847b8c84e3e8076fd3c42cc00517a10426ed65, # v3.0.0
        if: failure() && env.SLACK_NOTIFICATIONS_ENABLED == 'true',
        with: {type: '${{ job.status }}', job_name: '${{ job.status }}', channel: '#defold-alarms-build', url: '${{ secrets.SLACK_WEBHOOK }}',
               mention: 'here', mention_if: 'failure', commit: true, token: '${{ secrets.SERVICES_GITHUB_TOKEN }}'}
      }]
