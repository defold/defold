  build-android:
    strategy:
      matrix:
        platform: [ arm64-android, armv7-android ]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: "${{ env.BUILD_BRANCH }}"

      - name: Setup NDK (r25b)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b
          add-to-path: false

      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libc6-dev-i386 gcc-multilib

      - name: Install dependencies
        run: ci/ci.sh install --platform=${{ matrix.platform }}

      - name: Build HarfBuzz
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        shell: bash
        run: |
          set -euo pipefail

          ./scripts/build.py --save-env-path=ci/env.sh save_env
          source ci/env.sh
          echo "DYNAMO_HOME=$DYNAMO_HOME"

          export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export PATH="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"

          ./scripts/build.py install_waf
          cd external/harfbuzz

          if [[ "${{ matrix.platform }}" == "arm64-android" ]]; then
            export CC="aarch64-linux-android21-clang"
            export CXX="aarch64-linux-android21-clang++"
          else
            export CC="armv7a-linux-androideabi21-clang"
            export CXX="armv7a-linux-androideabi21-clang++"
          fi

          echo "=== Using NDK at: $ANDROID_NDK_ROOT ==="
          $CC --version

          waf distclean || true
          PREFIX="$DYNAMO_HOME" waf configure --platform=${{ matrix.platform }} -v
          waf -v install

          echo "Final package includes:"
          tar -tzf "build/harfbuzz-${{ env.HARFBUZZ_VERSION }}-${{ matrix.platform }}.tar.gz" | grep -E 'libharfbuzz\\.(a|lib)' || true

      - name: Archive results
        uses: actions/upload-artifact@v4
        with:
          name: harfbuzz-${{ env.HARFBUZZ_VERSION }}-${{ matrix.platform }}.tar.gz
          path: external/harfbuzz/build/harfbuzz-${{ env.HARFBUZZ_VERSION }}-${{ matrix.platform }}.tar.gz
          if-no-files-found: error
          retention-days: 1
