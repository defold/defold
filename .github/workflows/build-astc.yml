name: Build ASTC

on:
  workflow_dispatch:

env:
  DM_PACKAGES_URL: ${{ secrets.DM_PACKAGES_URL }}

jobs:
  build-linux:
    strategy:
      matrix:
        platform: [x86_64-linux]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: '${{ env.BUILD_BRANCH }}'
      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13
      - name: Install dependencies
        run: ci/ci.sh install --platform=${{ matrix.platform }}
      - name: Build ASTC
        run: |
          PLATFORM=${{ matrix.platform }}
          printf '%s\n' \
            "set -euo pipefail" \
            "cd share/ext" \
            "./build.sh astcenc ${PLATFORM}" \
            | ./scripts/build.py shell
      - name: Check artifact
        run: |
          ls -lh share/ext/astcenc/build/${{ matrix.platform }} || true
      - name: Archive results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: astcenc-${{ matrix.platform }}
          path: share/ext/astcenc/build/${{ matrix.platform }}/astcenc-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-linux-arm:
    strategy:
      matrix:
        platform: [arm64-linux]
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: '${{ env.BUILD_BRANCH }}'
      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13
      - name: Install dependencies
        run: ci/ci.sh install --platform=${{ matrix.platform }}
      - name: Build ASTC
        run: |
          PLATFORM=${{ matrix.platform }}
          printf '%s\n' \
            "set -euo pipefail" \
            "cd share/ext" \
            "./build.sh astcenc ${PLATFORM}" \
            | ./scripts/build.py shell
      - name: Check artifact
        run: |
          ls -lh share/ext/astcenc/build/${{ matrix.platform }} || true
      - name: Archive results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: astcenc-${{ matrix.platform }}
          path: share/ext/astcenc/build/${{ matrix.platform }}/astcenc-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-macos:
    strategy:
      matrix:
        platform: [arm64-macos, x86_64-macos]
    runs-on: macOS-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: '${{ env.BUILD_BRANCH }}'
      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13
      - name: Install dependencies
        run: ci/ci.sh install --platform=${{ matrix.platform }}
      - name: Build ASTC
        run: |
          PLATFORM=${{ matrix.platform }}
          printf '%s\n' \
            "set -euo pipefail" \
            "cd share/ext" \
            "./build.sh astcenc ${PLATFORM}" \
            | ./scripts/build.py shell
      - name: Check artifact
        run: |
          ls -lh share/ext/astcenc/build/${{ matrix.platform }} || true
      - name: Archive results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: astcenc-${{ matrix.platform }}
          path: share/ext/astcenc/build/${{ matrix.platform }}/astcenc-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-windows:
    strategy:
      matrix:
        platform: [x86_64-win32]
    runs-on: windows-2025
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: '${{ env.BUILD_BRANCH }}'
      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13
      - name: Install dependencies
        run: ci/ci.sh install --platform=${{ matrix.platform }}
        shell: bash
      - name: Install platform SDK
        shell: bash
        env:
          DEFOLD_HOME: ${{ github.workspace }}
          DYNAMO_HOME: ${{ github.workspace }}/tmp/dynamo_home
          PYTHONPATH: ${{ github.workspace }}/tmp/dynamo_home/lib/python:${{ github.workspace }}/build_tools:${{ github.workspace }}/tmp/dynamo_home/ext/lib/python
          JAVA_HOME: ${{ github.workspace }}/tmp/fake_java
        run: |
          set -euo pipefail
          python ./scripts/build.py --platform=${{ matrix.platform }} install_sdk
      - name: Build ASTC
        shell: bash
        run: |
          set -euo pipefail
          OLDPATH=$PATH
          source ci/env.sh
          export PATH=$PATH:$OLDPATH
          cd share/ext
          ./build.sh astcenc ${{ matrix.platform }}
      - name: Check artifact
        run: |
          ls -lh share/ext/astcenc/build/${{ matrix.platform }} || true
        shell: bash
      - name: Archive results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: astcenc-${{ matrix.platform }}
          path: share/ext/astcenc/build/${{ matrix.platform }}/astcenc-*.tar.gz
          if-no-files-found: error
          retention-days: 1
