name: Build ASTC

on:
  push:
    branches-ignore:
      - 'skip-ci-*'
      - 'DEFEDIT-*'
      - 'editor-dev'

env:
  DM_PACKAGES_URL: ${{ secrets.DM_PACKAGES_URL }}

jobs:
  build-linux:
    strategy:
      matrix:
        platform: [x86_64-linux]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: '${{ env.BUILD_BRANCH }}'
      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: 3.13
      - name: Install dependencies
        run: ci/ci.sh install --platform=${{ matrix.platform }}
      - name: Build ASTC
        run: |
          PLATFORM=${{ matrix.platform }}
          printf '%s\n' \
            "set -euo pipefail" \
            "cd share/ext" \
            "./build.sh astcenc ${PLATFORM}" \
            | ./scripts/build.py shell
      - name: Check artifact
        run: |
          ls -lh share/ext/astcenc/build/${{ matrix.platform }} || true
      - name: Archive results
        uses: actions/upload-artifact@v4
        with:
          name: astcenc-${{ matrix.platform }}
          path: share/ext/astcenc/build/${{ matrix.platform }}/astcenc-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-linux-arm:
    strategy:
      matrix:
        platform: [arm64-linux]
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: '${{ env.BUILD_BRANCH }}'
      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: 3.13
      - name: Install dependencies
        run: ci/ci.sh install --platform=${{ matrix.platform }}
      - name: Build ASTC
        run: |
          PLATFORM=${{ matrix.platform }}
          printf '%s\n' \
            "set -euo pipefail" \
            "cd share/ext" \
            "./build.sh astcenc ${PLATFORM}" \
            | ./scripts/build.py shell
      - name: Check artifact
        run: |
          ls -lh share/ext/astcenc/build/${{ matrix.platform }} || true
      - name: Archive results
        uses: actions/upload-artifact@v4
        with:
          name: astcenc-${{ matrix.platform }}
          path: share/ext/astcenc/build/${{ matrix.platform }}/astcenc-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-macos:
    strategy:
      matrix:
        platform: [arm64-macos, x86_64-macos]
    runs-on: macOS-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: '${{ env.BUILD_BRANCH }}'
      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: 3.13
      - name: Install dependencies
        run: ci/ci.sh install --platform=${{ matrix.platform }}
      - name: Build ASTC
        run: |
          PLATFORM=${{ matrix.platform }}
          printf '%s\n' \
            "set -euo pipefail" \
            "cd share/ext" \
            "./build.sh astcenc ${PLATFORM}" \
            | ./scripts/build.py shell
      - name: Check artifact
        run: |
          ls -lh share/ext/astcenc/build/${{ matrix.platform }} || true
      - name: Archive results
        uses: actions/upload-artifact@v4
        with:
          name: astcenc-${{ matrix.platform }}
          path: share/ext/astcenc/build/${{ matrix.platform }}/astcenc-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-windows:
    strategy:
      matrix:
        platform: [x86_64-win32]
    runs-on: windows-2025
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: '${{ env.BUILD_BRANCH }}'
      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: 3.13
      - name: Install dependencies
        run: ci/ci.sh install --platform=${{ matrix.platform }}
        shell: bash
      - name: Resolve Windows toolset metadata
        id: win_toolset
        shell: bash
        run: |
          set -euo pipefail
          eval "$(python build_tools/set_sdk_vars.py VERSION_WINDOWS_MSVC_2022)"
          echo "Resolved MSVC toolset version: ${VERSION_WINDOWS_MSVC_2022}"
          TOOLSET_SHORT="$(echo "${VERSION_WINDOWS_MSVC_2022}" | cut -d. -f1-2)"
          echo "msvc_toolset=${TOOLSET_SHORT}" >> "$GITHUB_OUTPUT"
      - name: Setup Visual Studio toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: '2022'
          toolset: ${{ steps.win_toolset.outputs.msvc_toolset }}
      - name: Build ASTC
        shell: bash
        run: |
          ./scripts/build.py shell <<'EOS'
          set -euo pipefail
          cd share/ext
          ./build.sh astcenc ${{ matrix.platform }}
          EOS
      - name: Check artifact
        run: |
          ls -lh share/ext/astcenc/build/${{ matrix.platform }} || true
        shell: bash
      - name: Archive results
        uses: actions/upload-artifact@v4
        with:
          name: astcenc-${{ matrix.platform }}
          path: share/ext/astcenc/build/${{ matrix.platform }}/astcenc-*.tar.gz
          if-no-files-found: error
          retention-days: 1
