name: Build Protobuf

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      push_changes:
        description: 'Commit built protobuf packages to ./packages on the branch'
        type: boolean
        default: false
      target_branch:
        description: 'Branch to update; defaults to the selected workflow branch'
        type: string
        default: ''

env:
  DM_PACKAGES_URL: ${{ secrets.DM_PACKAGES_URL }}
  PROTOBUF_VERSION: '34.0'
  PROTOBUF_PYTHON_VERSION: '7.34.0'
  BUILD_BRANCH: ${{ github.event.inputs.target_branch || github.ref_name }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platforms:
          - { name: 'x86_64-linux', runner: 'ubuntu-22.04', target: 'linux' }
          - { name: 'arm64-linux', runner: 'ubuntu-22.04-arm', target: 'linux' }
          - { name: 'arm64-macos', runner: 'macOS-14', target: 'macos' }
          - { name: 'x86_64-macos', runner: 'macOS-14', target: 'macos' }
          - { name: 'arm64-ios', runner: 'macOS-14', target: 'macos' }
          - { name: 'x86_64-ios', runner: 'macOS-14', target: 'macos' }
          - { name: 'wasm-web', runner: 'ubuntu-22.04', target: 'web' }
          - { name: 'wasm_pthread-web', runner: 'ubuntu-22.04', target: 'web' }
          - { name: 'win32', runner: 'windows-2025', target: 'windows', msvc_arch: 'x86' }
          - { name: 'x86_64-win32', runner: 'windows-2025', target: 'windows', msvc_arch: 'x64' }
          - { name: 'arm64-android', runner: 'ubuntu-22.04', target: 'android' }
          - { name: 'armv7-android', runner: 'ubuntu-22.04', target: 'android' }
    runs-on: ${{ matrix.platforms.runner }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ env.BUILD_BRANCH }}

      - name: Setup MSVC
        if: ${{ matrix.platforms.target == 'windows' }}
        uses: TheMrMilchmann/setup-msvc-dev@79dac248aac9d0059f86eae9d8b5bfab4e95e97c # v4.0.0
        with:
          arch: ${{ matrix.platforms.msvc_arch }}

      - name: Install Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: 3.13

      - name: Install dependencies
        shell: bash
        run: ci/ci.sh install --platform=${{ matrix.platforms.name }}

      - name: Install platform SDK
        if: ${{ matrix.platforms.target != 'windows' }}
        shell: bash
        run: |
          set -euo pipefail
          source ci/env.sh
          python scripts/build.py --platform=${{ matrix.platforms.name }} install_sdk

      - name: Install platform SDK (Windows)
        if: ${{ matrix.platforms.target == 'windows' }}
        shell: bash
        env:
          DEFOLD_HOME: ${{ github.workspace }}
          DYNAMO_HOME: ${{ github.workspace }}/tmp/dynamo_home
          PYTHONPATH: ${{ github.workspace }}/tmp/dynamo_home/lib/python:${{ github.workspace }}/build_tools:${{ github.workspace }}/tmp/dynamo_home/ext/lib/python
          JAVA_HOME: ${{ github.workspace }}/tmp/fake_java
        run: |
          set -euo pipefail
          python ./scripts/build.py --platform=${{ matrix.platforms.name }} install_sdk

      - name: Build protobuf
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build.py --save-env-path=ci/env.sh save_env

          ORIG_PATH="$PATH"
          if [ "${{ matrix.platforms.target }}" = "windows" ]; then
            export DEFOLD_HOME="$PWD"
            export DYNAMO_HOME="$PWD/tmp/dynamo_home"
            export PYTHONPATH="$DYNAMO_HOME/lib/python:$PWD/build_tools:$DYNAMO_HOME/ext/lib/python"
            export PATH="$ORIG_PATH:$DYNAMO_HOME/ext/bin:$DYNAMO_HOME/ext/bin/${{ matrix.platforms.name }}:$DYNAMO_HOME/bin:$DYNAMO_HOME/bin/${{ matrix.platforms.name }}"
            export CMAKE_GENERATOR="NMake Makefiles"
          else
            source ci/env.sh
          fi

          cd share/ext/protobuf
          ./build_protobuf.sh ${{ matrix.platforms.name }}

          echo "Final package includes:"
          tar -tzf "package/protobuf-${{ env.PROTOBUF_VERSION }}-${{ matrix.platforms.name }}.tar.gz" | grep -E 'libprotobuf|libabsl|libutf8' || true
          if [ -f "package/protobuf-${{ env.PROTOBUF_VERSION }}-${{ matrix.platforms.name }}.tar.gz" ]; then
            ls -lh "package/protobuf-${{ env.PROTOBUF_VERSION }}-${{ matrix.platforms.name }}.tar.gz"
          fi

      - name: Archive results (common)
        if: ${{ matrix.platforms.name == 'x86_64-linux' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: protobuf-${{ env.PROTOBUF_VERSION }}-common.tar.gz
          path: share/ext/protobuf/package/protobuf-${{ env.PROTOBUF_VERSION }}-common.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Archive results (platform-specific)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: protobuf-${{ env.PROTOBUF_VERSION }}-${{ matrix.platforms.name }}.tar.gz
          path: share/ext/protobuf/package/protobuf-${{ env.PROTOBUF_VERSION }}-${{ matrix.platforms.name }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  python-wheel:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: 3.13

      - name: Download Python protobuf wheel
        run: |
          set -euo pipefail
          mkdir -p package
          python -m pip download \
            --only-binary=:all: \
            --no-deps \
            --platform any \
            --implementation py \
            --python-version 310 \
            --abi none \
            "protobuf==${PROTOBUF_PYTHON_VERSION}" \
            -d package
          ls -lh package

      - name: Archive Python wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: protobuf-${{ env.PROTOBUF_PYTHON_VERSION }}-py3-none-any.whl
          path: package/protobuf-${{ env.PROTOBUF_PYTHON_VERSION }}-py3-none-any.whl
          if-no-files-found: error
          retention-days: 1

  push-packages:
    if: ${{ github.event_name == 'push' || inputs.push_changes }}
    needs: [build, python-wheel]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ env.BUILD_BRANCH }}
          fetch-depth: 0

      - name: Download artifacts to packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v5.0.0
        with:
          pattern: protobuf-${{ env.PROTOBUF_VERSION }}*.tar.gz
          path: packages
          merge-multiple: true

      - name: Download Python wheel to packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v5.0.0
        with:
          pattern: protobuf-${{ env.PROTOBUF_PYTHON_VERSION }}-py3-none-any.whl
          path: packages
          merge-multiple: true

      - name: Setup git user
        run: |
          git config user.email "services@defold.se"
          git config user.name "Defold Services"

      - name: Commit package updates
        shell: bash
        run: |
          set -euo pipefail

          git add \
            "packages/protobuf-${PROTOBUF_VERSION}-"*.tar.gz \
            "packages/protobuf-${PROTOBUF_PYTHON_VERSION}-py3-none-any.whl"

          if git diff --cached --quiet; then
            echo "No package changes to commit"
            exit 0
          fi

          git commit -m "packages: update protobuf ${PROTOBUF_VERSION}"
          git push origin "HEAD:${BUILD_BRANCH}"
